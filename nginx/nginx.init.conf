# Config temporaire HTTP uniquement — utilisee pour obtenir le certificat SSL initial
server {
    listen 80;
    server_name kifo168.odns.fr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Setup in progress';
        add_header Content-Type text/plain;
    }
}
