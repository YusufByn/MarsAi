version: "3.9"

services:
  db:
    image: mysql:8
    container_name: marsai-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: marsai-phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ABSOLUTE_URI: https://kifo168.odns.fr/pma/
    depends_on:
      - db

  backend:
    image: ghcr.io/${GHCR_OWNER}/marsai-backend:latest
    container_name: marsai-backend
    restart: always
    env_file: .env.backend
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_PASSWORD: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      NODE_ENV: production
      WEBSITE_URL: https://kifo168.odns.fr
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ghcr.io/${GHCR_OWNER}/marsai-frontend:latest
    container_name: marsai-frontend
    restart: always
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: marsai-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
      - phpmyadmin

  certbot:
    image: certbot/certbot
    container_name: marsai-certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

volumes:
  db_data:
  certbot_certs:
  certbot_www:
